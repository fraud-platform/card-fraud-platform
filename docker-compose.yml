# =============================================================================
# Card Fraud Platform - Shared Infrastructure
# =============================================================================
#
# All Card Fraud services share this infrastructure:
#   - PostgreSQL 18  (fraud_gov database)
#   - MinIO          (S3-compatible object storage)
#   - Redis 8.4      (velocity counters, caching)
#   - Redpanda       (Kafka-compatible event streaming)
#
# Usage:
#   uv run platform-up          # Start all infra (smart - skips running containers)
#   uv run platform-down        # Stop all
#   uv run platform-status      # Show status
#   uv run platform-reset       # Stop and remove all data
#
# Direct docker compose (requires Doppler for env vars):
#   doppler run -- docker compose up -d                    # Start infra only
#   doppler run -- docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile platform up -d
#   doppler run -- docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile platform --profile load-testing up -d
#   docker compose down                                    # Stop infra
#   docker compose down -v                                 # Stop and remove data
#
# All environment variables are managed via Doppler (card-fraud-platform project).
# Run `doppler setup` once in this directory to configure.
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # PostgreSQL 18 - Shared database for all services
  # ---------------------------------------------------------------------------
  # Single DB (fraud_gov) with single schema, shared by:
  #   - card-fraud-rule-management (rules CRUD)
  #   - card-fraud-transaction-management (transaction processing)
  #   - card-fraud-intelligence-portal (read-only queries)
  #   - card-fraud-analytics (future)
  postgres:
    image: pgvector/pgvector:pg18
    container_name: card-fraud-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fraud_gov
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_ADMIN_PASSWORD}
      FRAUD_GOV_APP_PASSWORD: ${FRAUD_GOV_APP_PASSWORD}
      FRAUD_GOV_ANALYTICS_PASSWORD: ${FRAUD_GOV_ANALYTICS_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql
      - ./init-db:/docker-entrypoint-initdb.d
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d fraud_gov"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # MinIO - S3-compatible object storage
  # ---------------------------------------------------------------------------
  # Shared bucket (fraud-gov-artifacts) used by:
  #   - card-fraud-rule-management (write compiled rulesets)
  #   - card-fraud-rule-engine-auth + card-fraud-rule-engine-monitoring (read compiled rulesets)
  #   - card-fraud-analytics (future: read offloaded data)
  minio:
    image: minio/minio:latest
    container_name: card-fraud-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    volumes:
      - minio_data:/data
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.5'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:9000/minio/health/ready || nc -z localhost 9000"]
      interval: 5s
      timeout: 5s
      retries: 30

  # MinIO bucket initialization (runs once on first start)
  minio-init:
    image: minio/mc:latest
    container_name: card-fraud-minio-init
    depends_on:
      minio:
        condition: service_healthy
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      S3_BUCKET_NAME: ${S3_BUCKET_NAME}
    entrypoint: ["sh", "-c"]
    command: >
      "mc alias set local http://minio:9000 $$MINIO_ROOT_USER $$MINIO_ROOT_PASSWORD &&
       mc mb --ignore-existing local/$$S3_BUCKET_NAME &&
       mc anonymous set download local/$$S3_BUCKET_NAME &&
       echo 'MinIO bucket $$S3_BUCKET_NAME initialized' >&2"
    networks:
      - card-fraud-network
    restart: "no"

  # ---------------------------------------------------------------------------
  # Redis 8.4 - Velocity counters and caching
  # ---------------------------------------------------------------------------
  # Used by:
  #   - card-fraud-rule-engine-auth + card-fraud-rule-engine-monitoring (atomic velocity counters, hot reload)
  #   - card-fraud-analytics (future: caching)
  redis:
    image: redis:8.4-alpine
    container_name: card-fraud-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 512M
        reservations:
          cpus: '1'
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    command: redis-server --appendonly yes --maxmemory 512mb --maxmemory-policy allkeys-lru

  # ---------------------------------------------------------------------------
  # Redpanda - Kafka-compatible event streaming
  # ---------------------------------------------------------------------------
  # Used by:
  #   - card-fraud-rule-engine-auth + card-fraud-rule-engine-monitoring (publish decision events)
  #   - card-fraud-transaction-management (consume decision events)
  redpanda:
    image: redpandadata/redpanda:v24.3.11
    container_name: card-fraud-redpanda
    restart: unless-stopped
    ports:
      - "9092:9092"    # Kafka API (external)
      - "9644:9644"    # Redpanda Admin API
    volumes:
      - redpanda_data:/var/lib/redpanda
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 3G
        reservations:
          cpus: '1'
          memory: 2G
    command: >
      redpanda start
      --kafka-addr internal://0.0.0.0:29092,external://0.0.0.0:9092
      --advertise-kafka-addr internal://redpanda:29092,external://localhost:9092
      --pandaproxy-addr 0.0.0.0:8082
      --advertise-pandaproxy-addr localhost:8082
      --rpc-addr 0.0.0.0:33145
      --advertise-rpc-addr localhost:33145
      --schema-registry-addr 0.0.0.0:8381
      --smp 1
      --memory 2G
    healthcheck:
      test: ["CMD", "rpk", "cluster", "health"]
      interval: 10s
      timeout: 10s
      retries: 10

  # Redpanda Console - Web UI for topic management
  redpanda-console:
    image: redpandadata/console:v2.3.4
    container_name: card-fraud-redpanda-console
    restart: unless-stopped
    ports:
      - "8083:8080"
    environment:
      KAFKA_BROKERS: redpanda:29092
      CONNECTORS_ENABLED: "false"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - card-fraud-network
    depends_on:
      redpanda:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # Jaeger All-in-One - Distributed tracing backend
  # ---------------------------------------------------------------------------
  # Receives OTLP traces from all services; provides the pipeline waterfall UI.
  # UI:        http://localhost:16686
  # OTLP gRPC: localhost:4317  (set OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317)
  # OTLP HTTP: localhost:4318
  jaeger:
    image: jaegertracing/all-in-one:1.62.0
    container_name: card-fraud-jaeger
    restart: unless-stopped
    ports:
      - "16686:16686"   # Jaeger UI
      - "4317:4317"     # OTLP gRPC receiver
      - "4318:4318"     # OTLP HTTP receiver
    environment:
      COLLECTOR_OTLP_ENABLED: "true"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:16686"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

  # ---------------------------------------------------------------------------
  # Prometheus - Metrics scraping and storage
  # ---------------------------------------------------------------------------
  # Scrapes metrics from all services; provides query API for Grafana.
  # UI:        http://localhost:9090
  # Services expose metrics at /api/v1/metrics (FastAPI services)
  prometheus:
    image: prom/prometheus:latest
    container_name: card-fraud-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"   # Prometheus UI
    volumes:
      - ./docker/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/etc/prometheus/console_libraries'
      - '--web.console.templates=/etc/prometheus/consoles'
      - '--storage.tsdb.retention.time=15d'
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9090/-/healthy"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M

  # ---------------------------------------------------------------------------
  # Grafana - Metrics visualization dashboards
  # ---------------------------------------------------------------------------
  # Queries Prometheus for metrics; provides pre-built dashboards.
  # UI:        http://localhost:3000 (admin/admin)
  grafana:
    image: grafana/grafana:latest
    container_name: card-fraud-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"   # Grafana UI
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
      - GF_SERVER_ROOT_URL=http://localhost:3000
      - GF_INSTALL_PLUGINS=grafana-piechart-panel
    volumes:
      - grafana_data:/var/lib/grafana
      - ./docker/grafana/provisioning:/etc/grafana/provisioning:ro
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/api/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - card-fraud-network
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 128M

volumes:
  postgres_data:
  minio_data:
  redis_data:
  redpanda_data:
  prometheus_data:
  grafana_data:

networks:
  card-fraud-network:
    name: card-fraud-network
    driver: bridge
