# =============================================================================
# Card Fraud Platform - Application Containers
# =============================================================================
#
# Application services that run as part of the shared platform stack.
#
# Usage (requires Doppler for env vars):
#   LLM/vector secrets live in card-fraud-ops-analyst-agent Doppler (single source of truth).
#   Platform secrets (DB, auth, S3) live in card-fraud-platform Doppler.
#   Merge both when starting containers:
#
#   eval $(doppler secrets download --project card-fraud-ops-analyst-agent --config local --no-file --format env-no-quotes) && \
#     doppler run --project card-fraud-platform --config local -- \
#     docker compose -f docker-compose.yml -f docker-compose.apps.yml --profile platform up -d
#
# Prerequisites:
#   - `doppler setup` completed (both card-fraud-platform and card-fraud-ops-analyst-agent projects)
#   - All sibling repos cloned at same level as card-fraud-platform/
#
# =============================================================================

services:
  # ---------------------------------------------------------------------------
  # Rule Management API (FastAPI) - Port 8000
  # ---------------------------------------------------------------------------
  rule-management:
    build:
      context: ../card-fraud-rule-management
      dockerfile: Dockerfile
    container_name: card-fraud-rule-management
    ports:
      - "8000:8000"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - APP_ENV=local
      - SECURITY_SKIP_JWT_VALIDATION=true
      - SECURITY_CORS_ALLOWED_ORIGINS=${SECURITY_CORS_ALLOWED_ORIGINS}
      - DATABASE_URL_APP=postgresql://fraud_gov_app_user:${FRAUD_GOV_APP_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - DATABASE_URL_ADMIN=postgresql://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - S3_FORCE_PATH_STYLE=true
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${RULE_MGMT_AUTH0_AUDIENCE}
      # OpenTelemetry - connect to platform Jaeger
      - OTEL_ENABLED=true
      - OTEL_SERVICE_NAME=fraud-governance-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_TRACES_SAMPLER=parent_trace_always
    networks:
      - card-fraud-network
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # Rule Engine AUTH (Quarkus/Java 25) - Port 8081
  # ---------------------------------------------------------------------------
  rule-engine-auth:
    build:
      context: ../card-fraud-rule-engine-auth
      dockerfile: Dockerfile
    container_name: card-fraud-rule-engine-auth
    ports:
      - "8081:8081"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    environment:
      - REDIS_URL=redis://:@redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - QUARKUS_PROFILE=load-test
      - QUARKUS_HTTP_HOST=0.0.0.0
      - QUARKUS_HTTP_PORT=8081
      - QUARKUS_LOG_LEVEL=INFO
      - JAVA_OPTS=-Xms1G -Xmx1536M -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+AlwaysPreTouch
      - LOAD_SHEDDING_ENABLED=false
      - RULESET_STARTUP_LOAD_ENABLED=false
      - RULESET_STARTUP_FAIL_FAST=false
      - STARTUP_VALIDATION=false
      - QUARKUS_SMALLRYE_JWT_ENABLED=false
      - SECURITY_SKIP_JWT_VALIDATION=true
      - APP_ENV=local
      # JFR is intentionally OFF by default for baseline performance runs.
      # Enable via docker-compose.override.jfr.yml when you explicitly want profiling.
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${RULE_ENGINE_AUTH0_AUDIENCE}
      - AUTH0_CLIENT_ID=${RULE_ENGINE_AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${RULE_ENGINE_AUTH0_CLIENT_SECRET}
      - MP_JWT_VERIFY_ISSUER=https://${AUTH0_DOMAIN}/
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=https://${AUTH0_DOMAIN}/.well-known/jwks.json
      - MP_JWT_VERIFY_AUDIENCES=${RULE_ENGINE_AUTH0_AUDIENCE}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    networks:
      - card-fraud-network
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/v1/evaluate/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # Rule Engine MONITORING (Quarkus/Java 25) - Port 8082 -> 8081
  # ---------------------------------------------------------------------------
  rule-engine-monitoring:
    build:
      context: ../card-fraud-rule-engine-monitoring
      dockerfile: Dockerfile
    container_name: card-fraud-rule-engine-monitoring
    ports:
      - "8082:8081"
    deploy:
      resources:
        limits:
          cpus: '4'
          memory: 2G
        reservations:
          cpus: '2'
          memory: 1G
    environment:
      - REDIS_URL=redis://:@redis:6379
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - QUARKUS_HTTP_HOST=0.0.0.0
      - QUARKUS_HTTP_PORT=8081
      - QUARKUS_LOG_LEVEL=INFO
      - JAVA_OPTS=-Xms1G -Xmx1536M -XX:+UseG1GC -XX:MaxGCPauseMillis=200 -XX:+AlwaysPreTouch
      - LOAD_SHEDDING_ENABLED=false
      - RULESET_STARTUP_LOAD_ENABLED=false
      - RULESET_STARTUP_FAIL_FAST=false
      - STARTUP_VALIDATION=false
      - QUARKUS_SMALLRYE_JWT_ENABLED=false
      - SECURITY_SKIP_JWT_VALIDATION=true
      - APP_ENV=local
      # JFR is intentionally OFF by default for baseline performance runs.
      # Enable via docker-compose.override.jfr.yml when you explicitly want profiling.
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${RULE_ENGINE_AUTH0_AUDIENCE}
      - AUTH0_CLIENT_ID=${RULE_ENGINE_AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${RULE_ENGINE_AUTH0_CLIENT_SECRET}
      - MP_JWT_VERIFY_ISSUER=https://${AUTH0_DOMAIN}/
      - MP_JWT_VERIFY_PUBLICKEY_LOCATION=https://${AUTH0_DOMAIN}/.well-known/jwks.json
      - MP_JWT_VERIFY_AUDIENCES=${RULE_ENGINE_AUTH0_AUDIENCE}
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
    networks:
      - card-fraud-network
    depends_on:
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://localhost:8081/v1/evaluate/health",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    profiles:
      - platform
  # ---------------------------------------------------------------------------
  # Transaction Management API (FastAPI) - Port 8002
  # ---------------------------------------------------------------------------
  transaction-management:
    build:
      context: ../card-fraud-transaction-management
      dockerfile: Dockerfile
    container_name: card-fraud-transaction-management
    ports:
      - "8002:8002"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - APP_ENV=local
      - SECURITY_SKIP_JWT_VALIDATION=true
      - SECURITY_CORS_ALLOWED_ORIGINS=${SECURITY_CORS_ALLOWED_ORIGINS}
      - DATABASE_URL_APP=postgresql+asyncpg://fraud_gov_app_user:${FRAUD_GOV_APP_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - DATABASE_URL_ADMIN=postgresql+asyncpg://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - KAFKA_BOOTSTRAP_SERVERS=redpanda:29092
      - S3_ENDPOINT_URL=http://minio:9000
      - S3_ACCESS_KEY_ID=${S3_ACCESS_KEY_ID}
      - S3_SECRET_ACCESS_KEY=${S3_SECRET_ACCESS_KEY}
      - S3_BUCKET_NAME=${S3_BUCKET_NAME}
      - S3_REGION=${S3_REGION}
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${TXN_MGMT_AUTH0_AUDIENCE}
    networks:
      - card-fraud-network
    depends_on:
      postgres:
        condition: service_healthy
      redpanda:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # Ops Analyst Agent (FastAPI) - Port 8003
  # ---------------------------------------------------------------------------
  ops-analyst-agent:
    build:
      context: ../card-fraud-ops-analyst-agent
      dockerfile: Dockerfile
    container_name: card-fraud-ops-analyst-agent
    ports:
      - "8003:8003"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    environment:
      - APP_ENV=local
      - SECURITY_SKIP_JWT_VALIDATION=true
      - SECURITY_CORS_ALLOWED_ORIGINS=${SECURITY_CORS_ALLOWED_ORIGINS}
      - DATABASE_URL_APP=postgresql+asyncpg://fraud_gov_app_user:${FRAUD_GOV_APP_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - DATABASE_URL_ADMIN=postgresql+asyncpg://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/fraud_gov?pool_size=20&max_overflow=10
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_AUDIENCE=${OPS_ANALYST_AUTH0_AUDIENCE}
      - AUTH0_CLIENT_ID=${OPS_ANALYST_AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${OPS_ANALYST_AUTH0_CLIENT_SECRET}
      - OPS_AGENT_RULE_MANAGEMENT_BASE_URL=http://rule-management:8000/api/v1
      - OPS_AGENT_ENABLE_LLM_REASONING=${OPS_AGENT_ENABLE_LLM_REASONING}
      - LLM_PROVIDER=${LLM_PROVIDER}
      - LLM_BASE_URL=${LLM_BASE_URL}
      - LLM_API_KEY=${LLM_API_KEY}
      - LLM_TIMEOUT=${LLM_TIMEOUT}
      - LLM_MAX_COMPLETION_TOKENS=${LLM_MAX_COMPLETION_TOKENS}
      - LLM_CONSISTENCY_THRESHOLD=${LLM_CONSISTENCY_THRESHOLD}
      - LLM_STAGE_TIMEOUT_SECONDS=${LLM_STAGE_TIMEOUT_SECONDS}
      - PLANNER_MODEL_NAME=${PLANNER_MODEL_NAME}
      - PLANNER_LLM_ENABLED=${PLANNER_LLM_ENABLED}
      - LANGGRAPH_INVESTIGATION_TIMEOUT_SECONDS=${LANGGRAPH_INVESTIGATION_TIMEOUT_SECONDS}
      - LANGGRAPH_TOOL_TIMEOUT_SECONDS=${LANGGRAPH_TOOL_TIMEOUT_SECONDS}
      - LANGGRAPH_PLANNER_TIMEOUT_SECONDS=${LANGGRAPH_PLANNER_TIMEOUT_SECONDS}
      - VECTOR_ENABLED=${VECTOR_ENABLED}
      - VECTOR_API_BASE=${VECTOR_API_BASE}
      - VECTOR_MODEL_NAME=${VECTOR_MODEL_NAME}
      - VECTOR_DIMENSION=${VECTOR_DIMENSION}
      - OTEL_EXPORTER_OTLP_ENDPOINT=http://jaeger:4317
      - OTEL_SERVICE_NAME=ops-analyst-agent
    networks:
      - card-fraud-network
    depends_on:
      postgres:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8003/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # MCP Gateway (FastAPI + FastMCP) - Port 8005 -> 8000
  # ---------------------------------------------------------------------------
  mcp-gateway:
    build:
      context: ../card-fraud-mcp-gateway
      dockerfile: Dockerfile
    container_name: card-fraud-mcp-gateway
    ports:
      - "8005:8000"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
        reservations:
          cpus: "0.25"
          memory: 256M
    environment:
      - APP_ENV=local
      - SECURITY_SKIP_JWT_VALIDATION=true
      - GATEWAY_PG_DSN=postgresql://postgres:${POSTGRES_ADMIN_PASSWORD}@postgres:5432/fraud_gov
      - GATEWAY_PG_POOL_MIN=2
      - GATEWAY_PG_POOL_MAX=10
      - GATEWAY_PG_MAX_ROWS=500
      - GATEWAY_PG_ALLOWED_SCHEMAS=fraud_gov,public
      - GATEWAY_PG_ALLOWED_TABLES=transactions,transaction_cases,transaction_reviews,card_profiles,fraud_rules,velocity_records
      - GATEWAY_REDIS_URL=redis://redis:6379
      - GATEWAY_REDIS_MAX_KEYS=100
      - GATEWAY_REDIS_MAX_VALUE_BYTES=10000
      - "GATEWAY_REDIS_ALLOWED_PREFIXES=fraud:,session:,rate:"
      - GATEWAY_KAFKA_BROKERS=redpanda:29092
      - GATEWAY_KAFKA_MAX_MESSAGES=10
      - GATEWAY_KAFKA_MAX_PAYLOAD_BYTES=10000
      - GATEWAY_KAFKA_ALLOWED_TOPICS=fraud.transactions,fraud.decisions,fraud.alerts,fraud.card.decisions.v1,test.fraud.decisions.v1
      - GATEWAY_KAFKA_ALLOWED_GROUPS=fraud-engine,card-fraud-engine
      - GATEWAY_S3_ENDPOINT=http://minio:9000
      - GATEWAY_S3_ACCESS_KEY=${MINIO_ROOT_USER}
      - GATEWAY_S3_SECRET_KEY=${MINIO_ROOT_PASSWORD}
      - GATEWAY_S3_REGION=${S3_REGION}
      - GATEWAY_S3_MAX_OBJECT_BYTES=1000000
      - GATEWAY_S3_ALLOWED_BUCKETS=${S3_BUCKET_NAME}
      - GATEWAY_S3_ALLOWED_PREFIXES=${S3_BUCKET_NAME}/
      - GATEWAY_OPS_TRANSACTIONS_TABLE=transactions
      - GATEWAY_OPS_CASES_TABLE=transaction_cases
      - GATEWAY_OPS_DECISIONS_TABLE=transaction_reviews
      - GATEWAY_OTEL_ENDPOINT=http://jaeger:4317
      - GATEWAY_OTEL_SERVICE_NAME=card-fraud-mcp-gateway
      - GATEWAY_RATE_LIMIT_RPM=120
      - GATEWAY_ENFORCE_ALLOWLISTS=true
      - "GATEWAY_CORS_ORIGINS=[]"
      - GATEWAY_AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - GATEWAY_AUTH0_AUDIENCE=https://card-fraud-mcp-gateway
    networks:
      - card-fraud-network
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      redpanda:
        condition: service_healthy
      minio:
        condition: service_healthy
      jaeger:
        condition: service_started
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # Intelligence Portal (React/Vite + Nginx) - Port 5173
  # ---------------------------------------------------------------------------
  intelligence-portal:
    build:
      context: ../card-fraud-intelligence-portal
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_AUTH0_DOMAIN=${VITE_AUTH0_DOMAIN}
        - VITE_AUTH0_CLIENT_ID=${VITE_AUTH0_CLIENT_ID}
        - VITE_AUTH0_AUDIENCE=${VITE_AUTH0_AUDIENCE}
    container_name: card-fraud-intelligence-portal
    ports:
      - "5173:5173"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 256M
    networks:
      - card-fraud-network
    depends_on:
      rule-management:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--no-verbose",
          "--tries=1",
          "--spider",
          "http://127.0.0.1:5173/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    profiles:
      - platform

  # ---------------------------------------------------------------------------
  # Locust Load Testing - Port 8089
  # ---------------------------------------------------------------------------
  locust:
    image: locustio/locust:2.32.2
    container_name: card-fraud-locust
    ports:
      - "8089:8089"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 1G
        reservations:
          cpus: '0.5'
          memory: 512M
    volumes:
      - ../card-fraud-e2e-load-testing:/locust
    environment:
      - AUTH0_DOMAIN=${AUTH0_DOMAIN}
      - AUTH0_CLIENT_ID=${RULE_ENGINE_AUTH0_CLIENT_ID}
      - AUTH0_CLIENT_SECRET=${RULE_ENGINE_AUTH0_CLIENT_SECRET}
      - AUTH0_AUDIENCE=${RULE_ENGINE_AUTH0_AUDIENCE}
      - RULE_ENGINE_AUTH_URL=http://rule-engine-auth:8081
      - RULE_ENGINE_MONITORING_URL=http://rule-engine-monitoring:8081
      - TRANSACTION_MGMT_URL=http://transaction-management:8002
      - RULE_MGMT_URL=http://rule-management:8000
      - OPS_ANALYST_URL=http://ops-analyst-agent:8003
    command: -f /locust/src/locustfile.py --host=http://rule-engine-auth:8081
    networks:
      - card-fraud-network
    depends_on:
      rule-engine-auth:
        condition: service_healthy
      rule-engine-monitoring:
        condition: service_healthy
      ops-analyst-agent:
        condition: service_healthy
    profiles:
      - load-testing
networks:
  card-fraud-network:
    external: true
