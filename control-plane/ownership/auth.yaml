# Auth Ownership (Auth0)
# Owned by: card-fraud-platform
# Format: YAML
---
auth_models:
  in-process:
    services:
      - rule-management
      - transaction-management
      - ops-analyst-agent
    description: FastAPI services validating JWT tokens internally

  gateway:
    services:
      - rule-engine-auth
      - rule-engine-monitoring
    description: Quarkus services using Auth0 as JWT gateway

  spa:
    services:
      - intelligence-portal
    description: React frontend using Auth0 SPA SDK

shared:
  owner: platform
  resources:
    - AUTH0_DOMAIN
    - AUTH0_USER_AUDIENCE

service_specific:
  rule-management:
    owner: rule-management
    resources:
      - RULE_MGMT_AUTH0_AUDIENCE

  rule-engine:
    owner: rule-engine
    resources:
      - RULE_ENGINE_AUTH0_AUDIENCE
      - RULE_ENGINE_AUTH0_CLIENT_ID
      - RULE_ENGINE_AUTH0_CLIENT_SECRET

  transaction-management:
    owner: transaction-management
    resources:
      - TXN_MGMT_AUTH0_AUDIENCE

  ops-analyst-agent:
    owner: ops-analyst-agent
    resources:
      - OPS_ANALYST_AUTH0_AUDIENCE
      - OPS_ANALYST_AUTH0_CLIENT_ID
      - OPS_ANALYST_AUTH0_CLIENT_SECRET

  intelligence-portal:
    owner: intelligence-portal
    resources:
      - VITE_AUTH0_DOMAIN
      - VITE_AUTH0_CLIENT_ID
      - VITE_AUTH0_AUDIENCE

audience_model:
  human_user:
    owner: platform
    audience_env: AUTH0_USER_AUDIENCE
    consumers:
      - intelligence-portal
      - rule-management
      - transaction-management
      - ops-analyst-agent
    notes:
      - Single SPA audience for portal-issued human-user tokens.
      - VITE_AUTH0_AUDIENCE must mirror AUTH0_USER_AUDIENCE.
  m2m:
    notes:
      - Service-to-service and automation clients keep service-specific audiences.
    services:
      rule-management:
        audience_env: RULE_MGMT_AUTH0_AUDIENCE
      rule-engine:
        audience_env: RULE_ENGINE_AUTH0_AUDIENCE
      transaction-management:
        audience_env: TXN_MGMT_AUTH0_AUDIENCE
      ops-analyst-agent:
        audience_env: OPS_ANALYST_AUTH0_AUDIENCE
      mcp-gateway:
        audience_env: GATEWAY_AUTH0_AUDIENCE
