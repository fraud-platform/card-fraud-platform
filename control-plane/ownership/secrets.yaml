# Secrets Ownership (Doppler)
# Owned by: card-fraud-platform
# Format: YAML
---
projects:
  card-fraud-platform:
    owner: platform
    type: platform
    purpose: Shared runtime secrets for suite mode
    secrets:
      - POSTGRES_ADMIN_PASSWORD
      - FRAUD_GOV_APP_PASSWORD
      - FRAUD_GOV_ANALYTICS_PASSWORD
      - MINIO_ROOT_USER
      - MINIO_ROOT_PASSWORD
      - S3_ACCESS_KEY_ID
      - S3_SECRET_ACCESS_KEY
      - S3_BUCKET_NAME
      - S3_REGION
      - AUTH0_DOMAIN
      - AUTH0_USER_AUDIENCE
      - REDIS_URL
      - KAFKA_BOOTSTRAP_SERVERS
      - OTEL_EXPORTER_OTLP_ENDPOINT
      - SECURITY_CORS_ALLOWED_ORIGINS

  card-fraud-rule-management:
    owner: rule-management
    type: service
    purpose: Standalone config + service-specific values
    secrets:
      - RULE_MGMT_AUTH0_AUDIENCE
      - APP_ENV

  card-fraud-rule-engine-auth:
    owner: rule-engine
    type: service
    purpose: Standalone config + AUTH runtime values
    secrets:
      - RULE_ENGINE_AUTH0_AUDIENCE
      - RULE_ENGINE_AUTH0_CLIENT_ID
      - RULE_ENGINE_AUTH0_CLIENT_SECRET
      - QUARKUS_PROFILE

  card-fraud-rule-engine-monitoring:
    owner: rule-engine
    type: service
    purpose: Standalone config + MONITORING runtime values
    secrets:
      - RULE_ENGINE_AUTH0_AUDIENCE
      - RULE_ENGINE_AUTH0_CLIENT_ID
      - RULE_ENGINE_AUTH0_CLIENT_SECRET
      - QUARKUS_PROFILE

  card-fraud-transaction-management:
    owner: transaction-management
    type: service
    purpose: Standalone config + messaging values
    secrets:
      - TXN_MGMT_AUTH0_AUDIENCE
      - KAFKA_CONSUMER_GROUP_ID
      - KAFKA_DLQ_TOPIC

  card-fraud-intelligence-portal:
    owner: intelligence-portal
    type: service
    purpose: Standalone config + SPA values
    secrets:
      - VITE_AUTH0_DOMAIN
      - VITE_AUTH0_CLIENT_ID
      - VITE_AUTH0_AUDIENCE
      - VITE_API_URL

  card-fraud-ops-analyst-agent:
    owner: ops-analyst-agent
    type: service
    purpose: Service config + LLM/provider values
    secrets:
      - OPS_ANALYST_AUTH0_AUDIENCE
      - OPS_ANALYST_AUTH0_CLIENT_ID
      - OPS_ANALYST_AUTH0_CLIENT_SECRET
      - LLM_PROVIDER
      - LLM_API_KEY
      - LLM_BASE_URL
      - LLM_MODEL_NAME
      - PLANNER_MODEL_NAME
      - VECTOR_ENABLED
      - VECTOR_API_BASE
      - VECTOR_MODEL_NAME
      - VECTOR_DIMENSION

configs:
  - local
  - test
  - prod
